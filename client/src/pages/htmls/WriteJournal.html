        </a>
        <!-- Navigation -->
        <nav class="hidden md:flex gap-8 items-center text-sm tracking-widest font-ui-button">
            <a class="relative px-2 py-1 hover:bg-black hover:text-white transition-colors text-secondary" href="#">PROFILE</a>
            <a class="relative px-2 py-1 hover:bg-black hover:text-white transition-colors text-secondary" href="#">RECOMMEND</a>
            <a class="relative px-2 py-1 hover:bg-black hover:text-white transition-colors text-black border-b-4 border-black" href="#">JOURNALS</a>
            <a class="relative px-2 py-1 hover:bg-black hover:text-white transition-colors text-secondary" href="#">TIMELINE</a>
        </nav>
        <!-- Actions -->
        <div class="hidden md:flex gap-6 items-center text-sm tracking-widest font-ui-button">

        </div>

<!-- Main Content -->
<main class="flex-grow w-full max-w-container-max mx-auto px-margin py-20">
<div class="mb-16">
<h1 class="font-headline-xl text-headline-xl uppercase">#JOURNAL</h1>
<div class="w-24 h-2 bg-primary mt-4"></div>
</div>
<form class="grid grid-cols-12 gap-y-12 gap-x-gutter" id="journalForm">
<!-- Game Title -->
<div class="col-span-12 flex flex-col gap-2">
<label class="font-label-caps text-label-caps uppercase text-on-surface-variant">GAME_TITLE *</label>
<div class="relative">
<input autocomplete="off" class="w-full bg-surface pixel-border p-4 font-body-lg text-body-lg cursor-block focus:bg-surface focus:text-on-background" id="gameInput" placeholder="ENTER_GAME_TITLE" required="" type="text">
</div>
</div>
<!-- Log Title -->
<div class="col-span-12 flex flex-col gap-2">
<label class="font-label-caps text-label-caps uppercase text-on-surface-variant">LOG_TITLE *</label>
<input class="w-full bg-surface pixel-border p-4 font-body-md text-body-md cursor-block focus:bg-surface focus:text-on-background" maxlength="120" placeholder="ENTER_LOG_TITLE" type="text">
</div>
<!-- Log Content -->
<div class="col-span-12 flex flex-col gap-2">
<label class="font-label-caps text-label-caps uppercase text-on-surface-variant">LOG_CONTENT *</label>
<div class="pixel-border bg-surface flex flex-col">
<!-- Toolbar -->
<div class="border-b-2 border-primary p-2 flex gap-4 bg-surface-container-low">
<button class="p-1 hover:bg-primary hover:text-on-primary transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined">format_bold</span>
</button>
<button class="p-1 hover:bg-primary hover:text-on-primary transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined">format_italic</span>
</button>
<button class="p-1 hover:bg-primary hover:text-on-primary transition-colors flex items-center justify-center" type="button">
<span class="material-symbols-outlined">image</span>
</button>
<div class="flex-grow"></div>
<span class="font-label-caps text-[10px] self-center pr-2">MARKDOWN_SUPPORTED</span>
</div>
<!-- Textarea -->
<textarea class="w-full p-6 font-body-md text-body-md min-h-[400px] bg-surface resize-none border-none focus:ring-0 focus:bg-surface focus:text-on-background" placeholder="INITIATE_CHRONICLE_ENTRY..." required=""></textarea>
</div>
</div>
<!-- Action Buttons -->
<div class="col-span-12 flex flex-col md:flex-row gap-gutter pt-8">
<button class="flex-grow md:flex-grow-0 md:min-w-[240px] bg-primary text-on-primary font-ui-button text-ui-button py-6 pixel-border border-primary hover:bg-surface hover:text-primary transition-all active:scale-95 duration-75 uppercase" type="submit">
                    POST</button>
<button class="flex-grow md:flex-grow-0 md:min-w-[240px] bg-surface text-primary font-ui-button text-ui-button py-6 pixel-border border-primary hover:bg-surface-dim transition-all active:scale-95 duration-75 uppercase" onclick="window.history.back()" type="button">
                    CANCEL
                </button>
</div>
</form>
</main>
<!-- Footer -->
<footer class="w-full border-t-2 border-primary mt-12 bg-surface-container-lowest">
<div class="flex flex-col md:flex-row justify-between items-center px-8 py-8 w-full max-w-[1200px] mx-auto gap-8 md:gap-0">
<!-- Brand -->
<div class="w-[180px] flex items-center justify-center md:justify-start">
<img alt="Gaming Journal Club Logo" class="h-12 w-auto object-contain" src="https://lh3.googleusercontent.com/aida-public/AB6AXuD3uDgsLQwlLW2JmmP-2ZRHIgKGMFlXJiCsbxpRsH0lWdFr253xjbJrY3Lj5tyRBTdw7P81iLq6be5YanrxA0lUnBv_MvuE0_Ho6jMuawLHxBwqaDwQ7LxTHW-SCBaAL4mRsa8e_4pcbwn1LWu82NOoFy9_fJ-UW9jGEMMXzRXdgPVYq1hMumWOXL3dTuubH0JaBdlK3yRGHMsk7kcYQ01PGjydpRurHhQrFkD64tjqcpzLrqEMccNieHGfl0pV4ThXWxpL0F1BpHOe">
</div>
<!-- Links -->
<nav class="flex flex-wrap justify-center gap-6 text-sm tracking-widest font-label-caps">
<a class="text-secondary hover:text-primary hover:underline transition-colors uppercase" href="#">Terms</a>
<a class="text-secondary hover:text-primary hover:underline transition-colors uppercase" href="#">Privacy</a>
<a class="text-primary underline decoration-2 underline-offset-4 uppercase" href="#">Archive</a>
<a class="text-secondary hover:text-primary hover:underline transition-colors uppercase" href="#">Contact</a>
</nav>

            짤 2026 GAMING JOURNAL CLUB. ALL RIGHTS RESERVED.
        </div>
</div>
</footer>
<script>
        // Form Submission Interaction
        document.getElementById('journalForm').addEventListener('submit', (e) => {
            e.preventDefault();
            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = "UPLOADING_LOG...";
            setTimeout(() => {
                btn.innerHTML = "CHRONICLE_SYNCED";
                btn.classList.remove('bg-primary');
                btn.classList.add('bg-green-600');
                setTimeout(() => {
                    window.location.reload();
                }, 1500);
            }, 2000);
        });

        // ASCII Art Background decoration (Atmospheric)
        console.log(`

    </script>
