<h1 class="font-headline-lg text-headline-lg mb-8 uppercase text-primary border-b-2 border-primary pb-2 inline-block">CREATE_ACCOUNT</h1>
<form class="space-y-6">
<!-- IDENTIFIER -->
<div class="flex flex-col">
<label class="font-label-caps text-label-caps text-primary mb-2 uppercase flex items-center gap-2" for="identifier">
<span class="material-symbols-outlined text-[16px]">terminal</span>
                                IDENTIFIER
                            </label>
<input class="terminal-input bg-surface-container-lowest border-2 border-primary rounded-none p-3 font-body-md text-primary w-full focus:bg-surface-bright transition-colors" id="identifier" name="identifier" placeholder="ENTER_USERNAME_" type="text">
</div>
<!-- EMAIL ADDRESS -->
<div class="flex flex-col">
<label class="font-label-caps text-label-caps text-primary mb-2 uppercase flex items-center gap-2" for="email">
<span class="material-symbols-outlined text-[16px]">mail</span>
                                EMAIL ADDRESS
                            </label>
<input class="terminal-input bg-surface-container-lowest border-2 border-primary rounded-none p-3 font-body-md text-primary w-full focus:bg-surface-bright transition-colors" id="email" name="email" placeholder="ENTER_COMM_LINK_" type="email">
</div>
<!-- ACCESS CODE -->
<div class="flex flex-col">
<label class="font-label-caps text-label-caps text-primary mb-2 uppercase flex items-center gap-2" for="password">
<span class="material-symbols-outlined text-[16px]">key</span>
                                ACCESS CODE
                            </label>
<input class="terminal-input bg-surface-container-lowest border-2 border-primary rounded-none p-3 font-body-md text-primary w-full focus:bg-surface-bright transition-colors" id="password" name="password" placeholder="********" type="password">
</div>
<!-- CONFIRM ACCESS CODE -->
<div class="flex flex-col">
<label class="font-label-caps text-label-caps text-primary mb-2 uppercase flex items-center gap-2" for="confirm_password">
<span class="material-symbols-outlined text-[16px]">lock</span>
                                CONFIRM ACCESS CODE
                            </label>
<input class="terminal-input bg-surface-container-lowest border-2 border-primary rounded-none p-3 font-body-md text-primary w-full focus:bg-surface-bright transition-colors" id="confirm_password" name="confirm_password" placeholder="********" type="password">
</div>
<div class="pt-4">
<button class="w-full bg-primary text-on-primary border-2 border-primary font-ui-button text-ui-button uppercase py-4 hover:bg-surface-container-lowest hover:text-primary transition-colors duration-100 active:translate-y-1 active:shadow-none" type="submit">

                            </button>
</div>
