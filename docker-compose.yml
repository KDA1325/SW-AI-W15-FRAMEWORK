services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: game-archive-postgres
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: game_archive
      POSTGRES_USER: game_archive_user
      POSTGRES_PASSWORD: game_archive_password
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
